<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Эфириум: Навигатор</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        #game-container { width: 400px; height: 100vh; background: #1a1a1a; display: flex; flex-direction: column; border: 1px solid #444; box-sizing: border-box; }
        
        #header-ui { height: 6vh; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 13px; color: #c5a059; border-bottom: 1px solid #333; background: #111; box-sizing: border-box; }
        #back-btn { background: none; border: 1px solid #444; color: #888; padding: 2px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; }
        #back-btn:hover { color: #fff; background: #222; }

        #visual-block { width: 100%; height: 50vh; background-size: contain; background-repeat: no-repeat; background-position: center; border-bottom: 2px solid #c5a059; background-color: #111; box-sizing: border-box; }
        #text-block { padding: 15px 15px 10px 15px; display: flex; flex-direction: column; justify-content: flex-start; overflow: hidden; box-sizing: border-box; cursor: pointer; flex: 1; }
        
        #name-tag { color: #c5a059; font-size: 14px; margin: 0 0 4px 0; text-transform: uppercase; letter-spacing: 1px; }
        #main-text { font-size: 13px; line-height: 1.4; color: #eee; white-space: pre-wrap; overflow-y: auto; }
        
        #action-block { padding: 10px 15px 15px 15px; border-top: 1px solid #333; background: #1a1a1a; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-start; }
        .btn { display: block; width: 100%; padding: 8px; margin-bottom: 5px; background: #2a1b12; color: white; border: 1px solid #c5a059; cursor: pointer; text-align: center; font-size: 12px; box-sizing: border-box; border-radius: 4px; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="header-ui">
        <button id="back-btn">← Назад</button>
        <span id="page-num">Слайд 1</span>
        <span id="stats">🧠 0 | ✨ 0</span>
    </div>
    <div id="visual-block"></div>
    <div id="text-block">
        <h2 id="name-tag"></h2>
        <div id="main-text"></div>
    </div>
    <div id="action-block"></div>
</div>

<script>
    let state = { currentId: 0, logic: 0, soul: 0 };
    let historyStack = [];

    const story = [
        { id: 0, name: "Эфириум", img: "oblogka.png", text: "Добро пожаловать в мир Эфириума. Готовы ли вы стать Навигатором?", next: 1 },
        { id: 1, name: "Эпизод 1", img: "1.png", text: "«Гармония Первого Шага»", next: 2 },
        { id: 2, name: "Эфириум", img: "balkon.png", text: "«Мир — это не застывший камень. Мир — это бесконечный поток обмена».", next: 3 },
        { id: 3, name: "Эфириум", img: "balkon.png", text: "«В самом центре всех миров парит Эфириум. Величайший перекресток Вселенной.", next: 4 },
        { id: 4, name: "Эфириум", img: "balkon.png", text: "Здесь боги обменивают молнии на мудрость, алхимики предлагают удачу, а мастера — плоды своего труда.", next: 5 },
        { id: 5, name: "Эфириум", img: "balkon.png", text: "Тысячи нитей связывают тех, кто ищет, с теми, кто создает. Но там, где есть обмен, всегда есть место для Хаоса.", next: 6 },
        { id: 6, name: "Эфириум", img: "balkon.png", text: "Когда понимание исчезает, а гнев застилает глаза — город начинает дрожать.Чтобы Эфириум не рухнул, были созданы Навигаторы.", next: 7 },
        { id: 7, name: "Эфириум", img: "balkon.png", text: "Твоя задача — не судить. Твоя задача — восстанавливать Гармонию».", next: 8 },
        { id: 8, name: "📜 Правила Эфириума", img: "balkon.png", text: "Каждое твоё слово в этом мире имеет вес.", next: 9 },
        { id: 9, name: "📜 Правила Эфириума", img: "balkon.png", text: "Ты сам выбираешь, каким мастером стать:\n\n💡 Путь Разума: Твой выбор, если ты веришь в силу логики, точность данных и незыблемость правил.", next: 10 },
        { id: 10, name: "📜 Правила Эфириума", img: "balkon.png", text: "Порядок — это фундамент мира.\n\n✨ Путь Души: Твой выбор, если ты веришь в эмпатию, теплоту слов и понимание чувств.", next: 11 },
        { id: 11, name: "📜 Правила Эфириума", img: "balkon.png", text: "Милосердие — это дыхание мира.\n\n⚖️ Искусство Равновесия\nПомни: Разум без Души холоден, а Душа без Разума слепа.", next: 12 },
        { id: 12, name: "📜 Правила Эфириума", img: "balkon.png", text: "В верхней части экрана расположена Сфера Баланса. Она фиксирует каждое твое решение.", next: 13 },
        { id: 13, name: "📜 Правила Эфириума", img: "balkon.png", text: "Если ты сможешь удержать свои показатели в строгом равенстве, тебе откроется Истинный Путь — мудрость, скрытая от остальных.", next: 14 },
        { id: 14, name: "📜 Правила Эфириума", img: "balkon.png", text: "Она не помечена знаками, её можно найти только по велению сердца и ума.", next: 15 },
        { id: 15, name: "Искорка", img: "kabinetiskra.png", text: "— Просыпайся!\nУ дверей гость с очень тяжелым характером... и, кажется, очень тяжелым топором!", next: 16 },
        { id: 16, name: "Громри", img: "kabinetgnom.png", text: "— Где тут выдают артефакты?!\nМне нужен «Крушитель Гор»! Самый тяжелый молот в ваших хранилищах! И побыстрее, пока я сам тут всё не сокрушил!", next: 17 },
        { id: 17, name: "Искорка", img: "kabinetiskra.png", text: "— Он на взводе. «Крушитель Гор» предназначен для разрушения гранитных скал. Выдадим его или сначала поговорим?", next: 18 },
        { id: 18, name: "Выбор 1", img: "kabinet.png", text: "", choices: [
            { text: "«Громри, успокойтесь. Назовите цель использования — согласно правилам, такие артефакты выдаются только для сертифицированных работ».", inc: "logic", next: 19 },
            { text: "«Выглядите так, будто у вас случилась беда. Что заставляет такого почтенного мастера искать столь разрушительный инструмент?»", inc: "soul", next: 19 }
        ] },
        { id: 19, name: "Громри", img: "kabinetgnom.png", text: "— Да какая там беда... Дочка у меня.\nКроха! Попросила домик для кукол к празднику. Я начал собирать, а гвозди мелкие, дерево тонкое.", next: 20 },
        { id: 20, name: "Громри", img: "kabinetgnom.png", text: "Нужен инструмент потяжелее, чтобы один раз ударил — и готово!", next: 21 },
        { id: 21, name: "Текст", img: "kabinet.png", text: "— Гном явно не понимает, что мощный артефакт просто превратит подарок в пыль.\nНо он слишком упрям, чтобы принять простой отказ.", next: 22 },
        { id: 22, name: "Выбор 2", img: "kabinet.png", text: "", choices: [
            { text: "(Путь Разума 💡) «Громри, посмотри на расчеты. Плотность древесины в десять раз ниже гранита. Молот разнесет домик в щепки еще до того, как гвоздь войдет внутрь. Тебе нужен точный инструмент».", inc: "logic", next: 23 },
            { text: "(Путь Души ✨) «Представь лицо своей дочери. Она ждет не гору опилок, а чудо, созданное твоими руками. Настоящий мастер знает: любовь требует не силы, а нежного касания».", inc: "soul", next: 24 },
            { text: "⚖️ Истинный Путь: «Громри, истинное мастерство — это когда разум направляет силу. Возьми \"Молоточек Творца\". Он точен для дерева и согрет теплом твоих рук».", checkEqual: true, next: 25 }
        ] },
        { id: 23, name: "Текст", img: "kabinetgnom.png", text: "Громри хмурится, his логика мастера начинает брать верх.", next: 26 },
        { id: 24, name: "Текст", img: "kabinetgnom.png", text: "Громри замирает. Его взгляд смягчается, он неловко кашляет.", next: 26 },
        { id: 25, name: "Текст", img: "kabinet.png", text: "Громри берет инструмент. Он чувствует, что это — именно то, что нужно.", next: 26 },
        { id: 26, name: "Громри", img: "kabinetgnom.png", text: "— Ладно... Попробую сделать всё аккуратно. Надеюсь, дочка будет довольна.", next: 27 },
        { id: 27, name: "Текст", img: "kabinet.png", text: "— Спустя несколько часов на твой стол ложится короткая записка, прикрепленная к корзинке с горным медом.", next: 28 },
        { id: 28, name: "Записка", img: "kabinet.png", text: "«Медиатор, ты был прав. Домик вышел как настоящий дворец. Дочка смеялась всё утро.\nСпасибо, что не дал мне всё разломать по глупости. Заходи на эль».", next: 29 },
        { id: 29, name: "Текст", img: "kabinet.png", text: "«Ты не просто закрыл запрос. Ты услышал реальную проблему за громкими словами. Твой путь только начался, но Эфириум стал на одну улыбку светлее.", next: 30 },
        { id: 30, name: "Текст", img: "kabinet.png", text: "«Конец 1 эпизода»", next: 31 },

        { id: 31, name: "Эпизод 2", img: "2.png", text: "«Меж двух огней»\nТревожный сигнал", next: 32 },
        { id: 32, name: "Текст", img: "kabinet.png", text: "На столе ярко пульсирует кристалл связи, заливая комнату тревожным алым светом.", next: 33 },
        { id: 33, name: "Искорка", img: "kabinetiskra.png", text: "— выглядит взволнованной, искры вокруг неё мечутся быстрее обычного\n\n— Навигатор, срочно! На Центральном Рынке назревает настоящая катастрофа.", next: 34 },
        { id: 34, name: "Искорка", img: "rinokiskra.png", text: "Две крупнейшие торговые гильдии готовы вцепиться друг другу в глотки!", next: 35 },
        { id: 35, name: "Текст", img: "rinok.png", text: "Центральный Рынок разделен пополам: одна часть покрыта инеем, другая — оплавлена жаром.", next: 36 },
        { id: 36, name: "Текст", img: "rinok.png", text: "В центре — группа перепуганных торговцев вокруг ящика с пульсирующими драконьими яйцами", next: 37 },
        { id: 37, name: "Текст", img: "rinok.png", text: "— Воздух дрожит от напряжения.", next: 38 },
        { id: 38, name: "Текст", img: "rinok.png", text: "Слева — Ифриты, окутанные живым пламенем. Справа — Наги, чья кожа блестит от ледяной влаги.", next: 39 },
        { id: 39, name: "Текст", img: "rinok.png", text: "Между ними — кладка Драконьих яиц, которая может погибнуть в любую секунду.", next: 40 },
        { id: 40, name: "Ифрит", img: "rinokogon.png", text: "— Уберите свои ледяные руки от этого груза! Драконы — дети огня!", next: 41 },
        { id: 41, name: "Ифрит", img: "rinokogon.png", text: "Если мы не согреем их немедленно, они уснут навеки!", next: 42 },
        { id: 42, name: "Нага", img: "rinokled.png", text: "— Ваши костры превратят их в пепел еще до того, как они сделают первый вдох.", next: 43 },
        { id: 43, name: "Нага", img: "rinokled.png", text: "Им нужна влажная прохлада наших гротов, чтобы скорлупа не треснула!", next: 44 },
        { id: 44, name: "Текст", img: "rinok.png", text: "— Каждая секунда спора приближает гибель кладки.", next: 45 },
        { id: 45, name: "Текст", img: "rinok.png", text: "Тебе нужно принять решение быстро, основываясь на знаниях Эфириума.", next: 46 },
        { id: 46, name: "Выбор 1", img: "rinok.png", text: "", choices: [
            { text: "«Довольно споров! Согласно Архивам Эфириума, Драконьи яйца — это магические сосуды, требующие строгого баланса температур. Я требую немедленно прекратить стихийное воздействие!»", inc: "logic", next: 47 },
            { text: "«Посмотрите на эти яйца! Они уже пульсируют от страха. Ваша ярость вредит им больше, чем климат. Неужели ваше соперничество важнее будущего этих существ?»", inc: "soul", next: 47 }
        ] },
        { id: 47, name: "Искорка", img: "rinokiskra.png", text: "— Навигатор, яйца начали светиться оранжевым... нет, синим... они перегружены!", next: 48 },
        { id: 48, name: "Искорка", img: "rinokiskra.png", text: "Нам нужно аргументированное решение, которое устроит обе стороны и спасет груз. У нас есть свиток условий перевозки.", next: 49 },
        { id: 49, name: "Текст свитка", img: "rinok.png", text: "«Условия хранения Драконьих яиц: Скорлупа требует влажности для эластичности, но ядро нуждается в стабильном тепле для пробуждения сознания».", next: 50 },
        { id: 50, name: "Выбор 2", img: "rinok.png", text: "", choices: [
            { text: "(Путь Разума 💡) «Разделим обязанности согласно свитку. Ифриты будут поддерживать тепловой контур вокруг ящика, не касаясь его. Наги обеспечат туманную завесу. Это математически идеальное сочетание».", inc: "logic", next: 51 },
            { text: "(Путь Души ✨) «Вы оба — мастера своей стихии. Поделитесь своей силой так, как если бы вы убаюкивали собственных детей. Пусть пламя греет издалека, а влага нежно обволакивает. Сделайте это ради них».", inc: "soul", next: 52 },
            { text: "⚖️ Истинный Путь : «Объедините ваши энергии в один поток. Создайте Теплый Туман. Это редкое явление позволит теплу проникнуть внутрь, сохранив скорлупу мягкой. Это единственный способ спасти всю кладку целиком».", checkEqual: true, next: 53 }
        ] },
        { id: 51, name: "Рынок", img: "rinok.png", text: "Ифрит и Нага сверяются со свитком. Твоя аргументация безупречна.", next: 54 },
        { id: 52, name: "Рынок", img: "rinok.png", text: "Соперники переглядываются. Твои слова задели их гордость хранителей.", next: 54 },
        { id: 53, name: "Рынок", img: "rinok.png", text: "Стихии утихли, над кладкой висит мягкое золотистое марево. Ифрит и Нага пожимают друг другу руки — сдержанно, но уважительно.", next: 54 },
        { id: 54, name: "Искорка", img: "rinokiskra.png", text: "— Мы успели! Смотри, первое яйцо зашевелилось! Ты решил проблему так быстро, что пожар не успел начаться.", next: 55 },
        { id: 55, name: "Текст", img: "kabinet.png", text: "Вечер.\nНа столе лежит небольшая статуэтка дракона, вырезанная из обсидиана — подарок от обеих гильдий", next: 56 },
        { id: 56, name: "Текст", img: "kabinet.png", text: "— Быстрота решения без аргументов — это риск.\nАргументы без скорости — это опоздание. Сегодня ты доказал, что можете действовать мгновенно, не теряя при этом здравого смысла.", next: 57 },
        { id: 57, name: "Текст", img: "kabinet.png", text: "«Конфликт улажен. Репутации обеих сторон сохранены, а ценный груз спасен. Ты показал себя как Навигатор, способный принимать решения под давлением.", next: 58 },
        { id: 58, name: "Текст", img: "kabinet.png", text: "«Конец 2 эпизода»", next: 59 },

        { id: 59, name: "Эпизод 3", img: "3.png", text: "«Магия Простоты»", next: 60 },
        { id: 60, name: "Текст", img: "lab.png", text: "Лаборатория Алхимика. Пространство заставлено гигантскими медными трубами, кипящими ретортами и десятками манометров.", next: 61 },
        { id: 61, name: "Текст", img: "lab.png", text: "Повсюду валяются свитки с бесконечными формулами.  Искорка висит в воздухе, подозрительно рассматривая капающую из трубы зеленую жидкость", next: 62 },
        { id: 62, name: "Искорка", img: "labiskra.png", text: "— Навигатор, я здесь уже java-пять минут и до сих пор не поняла, как отсюда выйти.", next: 63 },
        { id: 63, name: "Искорка", img: "labiskra.png", text: "И почему здесь так пахнет жженой серой и... мокрым картоном?", next: 64 },
        { id: 64, name: "Зорг", img: "labal.png", text: "— Не трогайте ничего! Это «Золотой Контролер 3000»!", next: 65 },
        { id: 65, name: "Зорг", img: "labal.png", text: "Моё величайшее achievement. Он проверяет подлинность золотых монет через 12 стадий очистки, 4 круга трансмутации и подпись духа-нотариуса!", next: 66 },
        { id: 66, name: "Торговец", img: "labtorg.png", text: "— Навигатор, сделай что-нибудь! У меня очередь из караванов до самых ворот Эфириума.", next: 67 },
        { id: 67, name: "Торговец", img: "labtorg.png", text: "Чтобы проверить одну монету в этой машине, мне нужно ждать три часа и заполнить пять бланков!", next: 68 },
        { id: 68, name: "Торговец", img: "labtorg.png", text: "Мы пришли сюда торговать, а не стареть в этой лаборатории!", next: 69 },
        { id: 69, name: "Зорг", img: "labal.png", text: "— Точность требует жертв!", next: 70 },
        { id: 70, name: "Зорг", img: "labal.png", text: "Если мы упростим процесс, в город просочится фальшивое золото!", next: 71 },
        { id: 71, name: "Текст", img: "lab.png", text: "— Зорг вложил всю душу в сложность своей системы, но она парализует жизнь города.", next: 72 },
        { id: 72, name: "Текст", img: "lab.png", text: "Торговцы на грани бунта. Тебе нужно найти выход.", next: 73 },
        { id: 73, name: "Выбор 1", img: "lab.png", text: "", choices: [
            { text: "«Зорг, давайте взглянем на чертежи. Пять этапов из двенадцати дублируют друг друга. Логика подсказывает, что мы можем убрать лишнее без потери точности».", inc: "logic", next: 74 },
            { text: "«Зорг, посмотрите на этого человека. Ему не нужны идеальные формулы, ему нужно успеть домой к ужину. Ваша наука должна помогать людям, а не становиться для них клеткой».", inc: "soul", next: 74 }
        ] },
        { id: 74, name: "Текст", img: "lab.png", text: " Зорг ворчит, но прекращает крутить вентили", next: 75 },
        { id: 75, name: "Искорка", img: "labiskra.png", text: "— Навигатор, смотри, под этим ворохом труб лежит маленький синий камень.", next: 76 },
        { id: 76, name: "Текст", img: "lab.png", text: "Зорг использует его только на финальной стадии, чтобы подтвердить результат. Кажется, всё остальное — просто декорации?", next: 77 },
        { id: 77, name: "Выбор 2", img: "lab.png", text: "", choices: [
            { text: "(Путь Разума 💡) «Зорг, мы автоматизируем процесс. Все твои 12 стадий будут проходить внутри этого корпуса за секунду. Наружу мы выведем только один индикатор: горит свет — золото настоящее, не горит — подделка».", inc: "logic", next: 78 },
            { text: "(Путь Души ✨) «Давайте превратим это в чудо. Пусть торговец просто касается монетой вашего магического камня. Если золото чистое — камень запоет. Просто, ясно и вызывает доверие у каждого».", inc: "soul", next: 79 },
            { text: "⚖️ Истинный Путь: «Мы создадим \"Лакмусовый Кристалл\". Внутри него останется вся твоя гениальная алхимия (💡), но для людей он станет простым и понятным символом честной сделки (✨). Сложность должна служить нам, а не мы ей».", checkEqual: true, next: 80 }
        ] },
        { id: 78, name: "Текст", img: "lab.png", text: "Зорг озадачен, но признает, что это математически элегантно.", next: 81 },
        { id: 79, name: "Текст", img: "lab.png", text: "Торговец довольно кивает. Зорг начинает понимать ценность простоты.", next: 81 },
        { id: 80, name: "Текст", img: "lab.png", text: "Очереди исчезли. Торговцы быстро прикладывают монеты к небольшим светящимся кристаллам и с улыбкой жмут друг другу руки", next: 81 },
        { id: 81, name: "Искорка", img: "labiskra.png", text: "— Кто бы мог подумать, что одна маленькая вещь заменит целую лабораторию? Город снова дышит.", next: 82 },
        { id: 82, name: "Искорка", img: "labiskra.png", text: "Твой кабинет. На столе — один из тех самых Кристаллов Простоты, который теперь служит тебе пресс-папье", next: 83 },
        { id: 83, name: "Текст", img: "kabinet.png", text: "— Ты понял важный урок: сделать сложное — легко. Сделать сложное простым — вот истинная магия Навигатора.", next: 84 },
        { id: 84, name: "Текст", img: "kabinet.png", text: "«Система контроля упрощена. Экономика Эфириума спасена от бюрократии. Ты доказал, что лучший путь — это прямой путь.", next: 85 },
        { id: 85, name: "Текст", img: "kabinet.png", text: "«Конец 3 эпизода»", next: 86 },

        { id: 86, name: "Эпизод 4", img: "4.png", text: "«Купол Единства»", next: 87 },
        { id: 87, name: "Текст", img: "tma.png", text: "Главная площадь Эфириума. Небо, обычно яркое и светлое, затянуто тяжелыми, маслянисто-черными тучами.", next: 88 },
        { id: 88, name: "Текст", img: "tma.png", text: "По краям зданий ползут серые тени — «Облако Неопределенности»", next: 89 },
        { id: 89, name: "Искорка", img: "tmaiskra.png", text: "— Навигатор... мне холодно. И я не понимаю, куда лететь.", next: 90 },
        { id: 90, name: "Искорка", img: "tmaiskra.png", text: "Эти тени... они стирают смыслы. Если Облако опустится ниже, жители забудут, как доверять друг другу.", next: 91 },
        { id: 91, name: "Магистр", img: "tmamagistr.png", text: "— Это Неопределенность. Она питается разобщенностью.", next: 92 },
        { id: 92, name: "Магистр", img: "tmamagistr.png", text: "Моих сил хватит, чтобы удержать центр города лишь на час. Один Навигатор не сможет возвести купол над всем Эфириумом. Это физически невозможно.", next: 93 },
        { id: 93, name: "Текст", img: "zal.png", text: "Зал Советов. За столом сидят представители разных фракций: Счетовод в строгом мундире и Заклинатель в развевающейся мантии.", next: 94 },
        { id: 94, name: "Текст", img: "zal.png", text: "Они спорят, не глядя друг на друга", next: 95 },
        { id: 95, name: "Счетовод", img: "zalschet.png", text: "— Мы не можем тратить ресурсы на купол! Наши расчеты показывают, что вероятность успеха ниже 10%. Нам нужно просто запереться в подвалах и ждать.", next: 96 },
        { id: 96, name: "Заклинатель", img: "zalmag.png", text: "— Мы готовы ударить по облаку магией, но мы не знаем координат эпицентра! Мы просто сожжем запасы маны впустую.", next: 97 },
        { id: 97, name: "Текст", img: "zal.png", text: "— Страх заставляет их закрыться в своих узких задачах. Они видят только свои цифры или свою магию.", next: 98 },
        { id: 98, name: "Текст", img: "zal.png", text: "Тебе нужно стать тем, кто объединит их усилия.", next: 99 },
        { id: 99, name: "Выбор 1", img: "zal.png", text: "", choices: [
            { text: "«Счетоводы, мне нужны ваши данные о движении теней. Заклинатели, мне нужна ваша мощь. Если мы синхронизируем расчеты с магическим импульсом, эффективность возрастет в сотни раз. Это единственный логичный выход».", inc: "logic", next: 100 },
            { text: "«Посмотрите в окно! Там наши соседи, друзья, семьи. Если мы не поможем им сейчас, никакие отчеты и заклинания завтра не будут иметь значения. Мы — одна команда, и город рассчитывает на нас!»", inc: "soul", next: 100 }
        ] },
        { id: 100, name: "Текст", img: "bashny.png", text: "Вершина центральной башни. Ты стоишь на краю, протянув руки к небу.", next: 101 },
        { id: 101, name: "Текст", img: "bashny.png", text: "Слева от тебя — Счетовод с мерцающим свитком, справа — Заклинатель, чьи руки объяты сиянием", next: 102 },
        { id: 102, name: "Искорка", img: "bashnyiskra.png", text: "— Неопределенность наступает! Навигатор, направь их! Нам нужно объединить три разные энергии в один щит.", next: 103 },
        { id: 103, name: "Выбор 2", img: "bashny.png", text: "", choices: [
            { text: "(Путь Разума 💡) «Счетоводы, передайте сетку координат Заклинателям. Я буду контролировать частоту щита. Строем защиту по секторам, строго соблюдая интервалы! В единстве системы — наша сила».", inc: "logic", next: 104 },
            { text: "(Путь Души ✨) «Заклинатели, почувствуйте страх города и превратите его в решимость. Счетоводы, забудьте о процентах — верьте в нас. Я объединю вашу волю в один теплый свет. Мы защитим свой дом вместе!»", inc: "soul", next: 105 },
            { text: "⚖️ Истинный Путь : «Нам нужна и точность Аналитиков, и страсть Разработчиков. Я создам резонанс. Вы станете опорой (💡), а вы — сердцем (✨) нашего щита. Кросс-командное взаимодействие — вот наше истинное оружие!»", checkEqual: true, next: 106 }
        ] },
        { id: 104, name: "Текст", img: "bashny.png", text: "Щит выстраивается как идеальная геометрическая фигура. Холодный расчет побеждает хаос.", next: 107 },
        { id: 105, name: "Текст", img: "bashny.png", text: "Щит вспыхивает золотым светом, питаясь энергией общей надежды. Тьма отступает.", next: 107 },
        { id: 106, name: "Текст", img: "bashny.png", text: "Щит становится абсолютным. Он не просто защищает, он рассеивает Неопределенность, возвращая городу ясность.", next: 107 },
        { id: 107, name: "Текст", img: "rinok.png", text: "Площадь Эфириума. Небо снова чистое. Жители выходят из домов, Счетовод и Заклинатель обмениваются рукопожатием — они впервые работали так близко", next: 108 },
        { id: 108, name: "Искорка", img: "rinokiskra.png", text: "— Ты видел? Они улыбаются друг другу! Мы не просто спасли город, мы научили их работать вместе.", next: 109 },
        { id: 109, name: "Текст", img: "kabinet.png", text: "Твой кабинет. На стене появилась новая фреска, изображающая три руки, держащие один светящийся кристалл", next: 110 },
        { id: 110, name: "Текст", img: "kabinet.png", text: "— Сегодня ты понял: самый мощный артефакт в руках одиночки — ничто по сравнению с простой помощью соратника.", next: 111 },
        { id: 111, name: "Текст", img: "kabinet.png", text: "Ты не побоялся попросить о помощи и сам стал связующим звеном.", next: 112 },
        { id: 112, name: "Текст", img: "kabinet.png", text: "Облако Неопределенности рассеяно. Связи между гильдиями укреплены. Ты доказал, что Навигатор — это тот, кто объединяет сердца и умы.", next: 113 },
        { id: 113, name: "Текст", img: "kabinet.png", text: "«Конец 4 эпизода»", next: 114 },

        { id: 114, name: "Эпизод 5", img: "5.png", text: "«Пыль против Счастья»", next: 115 },
        { id: 115, name: "Текст", img: "tech.png", text: "Технический сектор Эфириума. Бесконечные ряды мерцающих арок-порталов.", next: 116 },
        { id: 116, name: "Текст", img: "tech.png", text: "Некоторые из них искрят, другие затянуты паутиной ошибок. Ты выглядишь измотанным: мантия испачкана магической сажей, в руках — бесконечный список «тикетов» на починку", next: 117 },
        { id: 117, name: "Искорка", img: "techiskra.png", text: "— Навигатор, это был самый длинный день в моей жизни.", next: 118 },
        { id: 118, name: "Искорка", img: "techiskra.png", text: "Мы починили сто сорок порталов, перенаправили тысячи запросов и ответили на миллион вопросов «А скоро заработает?».", next: 119 },
        { id: 119, name: "Искорка", img: "techiskra.png", text: "Я чувствовую себя как выжатый лимон...", next: 120 },
        { id: 120, name: "Текст", img: "tech.png", text: "Станционный Магистр появляется внезапно, его высокая фигура заслоняет свет ближайшего портала.", next: 121 },
        { id: 121, name: "Текст", img: "tech.png", text: "Он держит в руках пустой свиток для отчета", next: 122 },
        { id: 122, name: "Магистр", img: "techmagistr.png", text: "— Навигатор. Город гудит, как потревоженный улей. Ты провел здесь весь день.", next: 123 },
        { id: 123, name: "Магистр", img: "techmagistr.png", text: "Я пришел составить отчет о твоей эффективности. Расскажи мне, чего ты добился сегодня?", next: 124 },
        { id: 124, name: "Текст", img: "tech.png", text: "— У тебя кружится голова от усталости. Ты можешь рассказать о том, как много маны потратил и как сильно «задолбался», или посмотреть на этот день иначе.", next: 125 },
        { id: 125, name: "Выбор 1", img: "tech.png", text: "", choices: [
            { text: "«Магистр, взгляните на эти цифры. Я восстановил работоспособность 95% порталов сектора, потратив на 20% меньше энергии, чем планировалось. Все протоколы соблюдены».", inc: "logic", next: 126 },
            { text: "«Магистр, этот день был тяжелым, но посмотрите на тех людей у порталов. Они больше не спорят и не боятся. В город вернулось спокойствие, и это важнее любой статистики».", inc: "soul", next: 126 }
        ] },
        { id: 126, name: "Текст", img: "tech.png", text: "Тот же технический сектор. Вдалеке видна группа персонажей из прошлых серий: Гном Громри с дочкой, Ифриты и Наги, весело обсуждающие что-то у открытого портала", next: 127 },
        { id: 127, name: "Искорка", img: "techiskra.png", text: "— Навигатор, смотри! Это же те самые путники, которые застряли здесь утром. Они наконец-то могут попасть домой.", next: 128 },
        { id: 128, name: "Текст", img: "tech.png", text: "— Магистр внимательно смотрит на тебя. Он ждет финальный вывод. Что является истинным мерилом твоего успеха сегодня?", next: 129 },
        { id: 129, name: "Выбор", img: "tech.png", text: "", choices: [
            { text: "(Путь Разума 💡) «Главное — это стабильность системы. Сегодня я обеспечил бесперебойный поток обмена для десяти тысяч существ. Мой результат — это исправно работающий механизм Эфириума».", inc: "logic", next: 130 },
            { text: "(Путь Души ✨) «Главное — это судьбы. Десять тысяч существ сегодня вовремя обняли своих близких или успели на важную встречу. Мой результат — это их спасенные планы и радость».", inc: "soul", next: 131 },
            { text: "⚖️ Истинный Путь (Доступен при равенстве статов): «Мой результат — это единство цифр и судеб. Исправные порталы (💡) дали людям возможность изменить свою жизнь к лучшему (✨). Мы работаем не ради починки арок, а ради тех, кто через них проходит».", checkEqual: true, next: 132 }
        ] },
        { id: 130, name: "Текст", img: "tech.png", text: "Магистр кивает, записывая данные. Твоя логика безупречна.", next: 133 },
        { id: 131, name: "Текст", img: "tech.png", text: "Магистр тепло улыбается. Ты видишь за цифрами живых людей.", next: 133 },
        { id: 132, name: "Текст", img: "tech.png", text: "Магистр опускает свиток. Он нашел то, что искал. Кристалл в его посохе вспыхивает чистым белым светом.", next: 133 },
        { id: 133, name: "Текст", img: "tech.png", text: "Балкон твоего кабинета. За окном тихая ночь, Эфириум мерцает миллионами огней. Ты наконец-то пьешь свой чай", next: 134 },
        { id: 134, name: "Искорка", img: "balkon.png", text: "— Знаешь... я поняла. Неважно, как сильно мы устали. Важно, что завтра город проснется и всё будет работать. Благодаря тебе.", next: 135 },
        { id: 135, name: "Текст", img: "balkoniskra.png", text: "Твой кабинет. На столе лежит твой Личный Журнал Навигатора. Последняя запись светится золотом", next: 136 },
        { id: 136, name: "Текст", img: "kabinet.png", text: "— Ты усвоил главный урок: ценность работы измеряется не потраченными силами, а тем, насколько лучше стала жизнь окружающих.", next: 137 },
        { id: 137, name: "Текст", img: "kabinet.png", text: "«День завершен. Ориентир на результат достигнут. Ты научился отделять суету от истинного смысла.", next: 138 },
        { id: 138, name: "Текст", img: "kabinet.png", text: "«Конец 5 эпизода. Впереди — Финал Сезона»", next: 139 },

        { id: 139, name: "Финал Сезона", img: "6.png", text: "«Кристалл Единства»", next: 140 },
        { id: 140, name: "Текст", img: "plo.png", text: "Главная площадь Эфириума. Статичное изображение: город украшен сияющими лентами, в небе парят праздничные фонарики. На площади собрались сотни существ. Искорка надела крошечный праздничный колпак и буквально светится от восторга", next: 141 },
        { id: 141, name: "Искорка", img: "ploiskra.png", text: "— Навигатор, посмотри! Сегодня Великое Торжество. Город празднует эпоху Гармонии. И всё это... благодаря тебе. Посмотри на них!", next: 142 },
        { id: 142, name: "Текст", img: "plo.png", text: "Группа персонажей в толпе. Громри с дочерью машут тебе рукой; Ифрит и Нага стоят рядом, обсуждая новые условия торговли; Алхимик Зорг демонстрирует кому-то свой компактный Кристалл Простоты", next: 143 },
        { id: 143, name: "Текст", img: "plo.png", text: "— Ты видишь тех, чьи судьбы изменились после твоих решений. Но в центре площади Магистр готовит нечто важное.", next: 144 },
        { id: 144, name: "Текст", img: "plo.png", text: "Постамент в центре площади. На нем парит огромная пустая оправа для артефакта. Рядом стоит Старший Магистр", next: 145 },
        { id: 145, name: "Магистр", img: "krismagistr.png", text: "— Навигатор, выйди вперед. Весь сезон ты собирал осколки мудрости. Ты учился слышать потребности, принимать решения быстро, упрощать сложное, объединять команды и видеть результат. Теперь пришло время зажечь Кристалл Миссии. Каким он будет?", next: 146 },
        { id: 146, name: "Текст", img: "krismagistr.png", text: "— Перед тобой пять малых кристаллов — твои достижения. Тебе нужно соединить их в один. Это твой последний выбор, определяющий будущее Эфириума.", next: 147 },
        { id: 147, name: "Выбор финала", img: "kris.png", text: "", choices: [
            { text: "«Эфириум — это прежде всего безупречный порядок. Мой Кристалл будет светить светом Закона и Логики, чтобы каждый знал: здесь всё работает как часы».", inc: "logic", next: 148 },
            { text: "«Эфириум — это прежде всего люди и их чувства. Мой Кристалл будет светить светом Заботы и Тепла, чтобы каждый знал: здесь его всегда услышат и поддержат».", inc: "soul", next: 148 }
        ] },
        { id: 148, name: "Текст", img: "kris.png", text: "Твои руки, тянущиеся к артефакту. В зависимости от твоих статов, происходит финальная трансформация", next: 149 },
        { id: 149, name: "Текст", img: "kris.png", text: "— Твои статы определили финальную форму артефакта.", next: 150 },
        { id: 150, name: "Трансформация", img: "kris.png", text: "Какой энергией наполнится Эфириум?", choices: [
            { text: "(Посмотреть результат)", checkFinalRoute: "logic", next: 151 },
            { text: "(Посмотреть результат)", checkFinalRoute: "soul", next: 152 },
            { text: "(Посмотреть результат)", checkFinalRoute: "balance", next: 153 }
        ] },
        { id: 151, name: "Текст", img: "kris.png", text: "Кристалл вспыхивает холодным сапфировым светом. Город пронизывают нити четких связей.", next: 156 },
        { id: 152, name: "Текст", img: "krisvkl.png", text: "Кристалл заливает площадь мягким розовым сиянием. Жители чувствуют небывалый прилив спокойствия.", next: 156 },
        { id: 153, name: "Текст", img: "plo.png", text: "Ты касаешься оправы обеими руками. Синий и розовый потоки начинают вращаться вокруг него, сливаясь в ослепительно белое пламя", next: 154 },
        { id: 154, name: "Текст", img: "plo.png", text: "Наша работа — это не просто свитки и тикеты. Это механизм, который помогает каждому улучшить свою жизнь. Разум дает нам силу помогать точно, а Душа — делать это искренне.", next: 155 },
        { id: 155, name: "Текст", img: "plo.png", text: "— Пять артефактов сливаются в один Кристалл Миссии. Он пульсирует чистым белым светом, который питает каждый портал, каждую лавку и каждое сердце в Эфириуме.", next: 156 },
        { id: 156, name: "Текст", img: "kabinet.png", text: "Твой кабинет. Ты стоишь у окна, глядя на сияющий город. Искорка спит на плече", next: 157 },
        { id: 157, name: "Текст", img: "kabinet.png", text: "Итоги приключения...", next: 158 },
        { id: 158, name: "Завершение", img: "kabinet.png", text: "— Твое приключение подошло к концу. Ты понял, что Навигатор — это не профессия, а призвание. Ты — тот, кто держит баланс между «надо» и «хочется», между цифрами и улыбками.", next: "results_page" },
        { id: "results_page", name: "Финал", img: "kabinet.png", text: "Благодарим за прохождение! Надеемся, ты нашел свой путь в Эфириуме.", next: "survey_page" },
        { id: "survey_page", name: "Опрос", img: "6.png", text: "Пожалуйста, обязательно пройди наш опрос, чтобы мы могли стать лучше! Нам важно твое мнение.\n\nСсылка: https://forms.gle/dP7eAyG3cMyTiWkr7", choices: [
            { text: "Перейти к опросу", url: "https://forms.gle/dP7eAyG3cMyTiWkr7" }
        ]}
    ];

    let pageNumElem = document.getElementById("page-num");
    let statsElem = document.getElementById("stats");
    let visualBlock = document.getElementById("visual-block");
    let nameTag = document.getElementById("name-tag");
    let mainText = document.getElementById("main-text");
    let actionBlock = document.getElementById("action-block");

    function renderPage() {
        actionBlock.innerHTML = "";
        let page = story.find(p => p.id === state.currentId);
        if (!page) return;

        pageNumElem.innerText = "Слайд " + (typeof page.id === 'number' ? (page.id + 1) : page.id);
        statsElem.innerText = "🧠 " + state.logic + " | ✨ " + state.soul;
        visualBlock.style.backgroundImage = page.img ? `url('${page.img}')` : "none";
        nameTag.innerText = page.name;
        mainText.innerText = page.text;
        
        if (page.choices) {
            page.choices.forEach(choice => {
                if (choice.checkEqual && state.logic !== state.soul) return;
                if (choice.checkFinalRoute) {
                    if (choice.checkFinalRoute === "logic" && state.logic <= state.soul) return;
                    if (choice.checkFinalRoute === "soul" && state.soul <= state.logic) return;
                    if (choice.checkFinalRoute === "balance" && state.logic !== state.soul) return;
                }
                
                let button = document.createElement("button");
                button.className = "btn";
                button.innerText = choice.text;
                button.onclick = () => {
                    if (choice.url) { window.open(choice.url, '_blank'); return; }
                    saveHistory();
                    if (choice.inc === "logic") state.logic++;
                    if (choice.inc === "soul") state.soul++;
                    state.currentId = choice.next;
                    renderPage();
                };
                actionBlock.appendChild(button);
            });
        } else if (page.next !== null) {
            document.getElementById("text-block").onclick = () => {
                saveHistory();
                state.currentId = page.next;
                renderPage();
            };
        }
    }

    function saveHistory() { historyStack.push(JSON.stringify(state)); }
    document.getElementById("back-btn").onclick = () => {
        if (historyStack.length > 0) { state = JSON.parse(historyStack.pop()); renderPage(); }
    };
    renderPage();
</script>
</body>
</html>
